<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .api-url {
            text-align: center;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            font-family: monospace;
            font-size: 1.2em;
            color: #495057;
            border: 2px solid #dee2e6;
        }

        .mindmap {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .category {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 20px;
            min-width: 280px;
            flex: 1;
            min-width: 300px;
            max-width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .category:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .category-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(0,0,0,0.1);
        }

        .category-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.2em;
            color: white;
            font-weight: bold;
        }

        .category-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .category-path {
            font-size: 0.85em;
            color: #666;
            font-family: monospace;
            margin-top: 5px;
        }

        .endpoints {
            list-style: none;
        }

        .endpoint {
            background: white;
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85em;
            border-left: 3px solid #4CAF50;
            transition: all 0.2s ease;
        }

        .endpoint:hover {
            background: #f0f0f0;
            border-left-width: 5px;
        }

        .endpoint.get { border-left-color: #2196F3; }
        .endpoint.post { border-left-color: #4CAF50; }
        .endpoint.put { border-left-color: #FF9800; }
        .endpoint.delete { border-left-color: #f44336; }
        .endpoint.patch { border-left-color: #9C27B0; }

        .method {
            font-weight: bold;
            margin-right: 8px;
        }

        .method.GET { color: #2196F3; }
        .method.POST { color: #4CAF50; }
        .method.PUT { color: #FF9800; }
        .method.DELETE { color: #f44336; }
        .method.PATCH { color: #9C27B0; }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .container {
                box-shadow: none;
                padding: 20px;
            }
        }
    </style>
</head>

        function renderMindMap() {

            let totalEndpoints = 0;

            for (const [category, data] of Object.entries(apiData)) {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                categoryDiv.innerHTML = `
                    <div class="category-header">
                        <div class="category-icon" style="background: ${data.color}">
                            ${data.icon}
                        </div>
                        <div>
                            <div class="category-title">${category}</div>
                            <div class="category-path">${data.path}</div>
                        </div>
                    </div>
                    <ul class="endpoints">
                        ${data.endpoints.map(ep => {
                            totalEndpoints++;
                            return `<li class="endpoint ${ep.method.toLowerCase()}">
                                <span class="method ${ep.method}">${ep.method}</span>
                                ${ep.path}
                            </li>`;
                        }).join('')}
                    </ul>
                `;
                container.appendChild(categoryDiv);
            }

            document.getElementById('totalEndpoints').textContent = totalEndpoints;
